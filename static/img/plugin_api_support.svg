<svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="8" ry="8" style="fill:var(--feat-card-bg);stroke:var(--feat-line)" stroke-width="1"/>
  <g style="stroke:var(--feat-line)" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="60" x2="200" y2="60"/>
    <line x1="0" y1="140" x2="200" y2="140"/>
    <line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/>
  </g>
  <text x="100" y="38" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" style="fill:var(--feat-title)">Rich Plugin API</text>
  <text x="100" y="60" font-family="Courier New, monospace" font-size="12" font-weight="bold" text-anchor="middle" style="fill:var(--feat-line)">&lt;/&gt;</text>
  <g transform="translate(100, 116)">
    <rect x="-34" y="-32" width="32" height="32" rx="4" ry="4" fill="#4facfe"><animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="2" y="-32" width="32" height="32" rx="4" ry="4" fill="#43e97b"><animate attributeName="opacity" values="1;0.7;1" dur="3s" begin="0.5s" repeatCount="indefinite"/></rect>
    <rect x="-34" y="4" width="32" height="32" rx="4" ry="4" fill="#8c8c8c"><animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1s" repeatCount="indefinite"/></rect>
    <rect x="2" y="4" width="32" height="32" rx="4" ry="4" style="fill:var(--feat-surface);stroke:var(--feat-line)" stroke-width="1"><animate attributeName="opacity" values="1;0.7;1" dur="3s" begin="1.5s" repeatCount="indefinite"/></rect>
    <text x="-18" y="-12" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">E</text>
    <text x="18" y="-12" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">F</text>
    <text x="-18" y="24" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">S</text>
    <text x="18" y="24" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" style="fill:var(--feat-muted)">C</text>
  </g>
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" style="fill:var(--feat-muted)">Events · Forms · Scoreboard · Custom</text>
</svg>

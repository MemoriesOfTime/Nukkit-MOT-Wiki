<svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="8" ry="8" style="fill:var(--feat-card-bg);stroke:var(--feat-line)" stroke-width="1"/>
  <g style="stroke:var(--feat-line)" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="60" x2="200" y2="60"/>
    <line x1="0" y1="140" x2="200" y2="140"/>
    <line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/>
  </g>
  <text x="100" y="38" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" style="fill:var(--feat-title)">AI Entity Support</text>
  <circle cx="100" cy="112" r="40" fill="none" stroke="#4facfe" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>
  <circle cx="100" cy="112" r="13" fill="#4facfe">
    <animate attributeName="r" values="13;15;13" dur="3s" repeatCount="indefinite"/>
  </circle>
  <g fill="#4facfe">
    <circle cx="140" cy="112" r="4"><animateTransform attributeName="transform" type="rotate" from="0 100 112" to="360 100 112" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="112" r="4"><animateTransform attributeName="transform" type="rotate" from="120 100 112" to="480 100 112" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="112" r="4"><animateTransform attributeName="transform" type="rotate" from="240 100 112" to="600 100 112" dur="9s" repeatCount="indefinite"/></circle>
  </g>
  <circle cx="100" cy="144" r="3" fill="#43e97b"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
  <text x="100" y="172" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" style="fill:var(--feat-muted)">Living, intelligent entities</text>
</svg>

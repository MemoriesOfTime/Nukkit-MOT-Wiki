<svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="8" ry="8" style="fill:var(--feat-card-bg);stroke:var(--feat-line)" stroke-width="1"/>
  <g style="stroke:var(--feat-line)" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="60" x2="200" y2="60"/>
    <line x1="0" y1="140" x2="200" y2="140"/>
    <line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/>
  </g>
  <text x="100" y="38" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" style="fill:var(--feat-title)">Multiple Version Support</text>
  <line x1="35" y1="108" x2="165" y2="108" stroke="#4facfe" stroke-width="2" stroke-linecap="round"/>
  <g fill="#4facfe">
    <circle cx="40" cy="108" r="6"><animate attributeName="r" values="6;7.5;6" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="73" cy="108" r="6"><animate attributeName="r" values="6;7.5;6" dur="3s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="108" r="6"><animate attributeName="r" values="6;7.5;6" dur="3s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="127" cy="108" r="6"><animate attributeName="r" values="6;7.5;6" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="108" r="6"><animate attributeName="r" values="6;7.5;6" dur="3s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>
  <g font-family="Arial, sans-serif" font-size="8" text-anchor="middle" style="fill:var(--feat-muted)">
    <text x="40" y="130">1.1</text>
    <text x="73" y="130">…</text>
    <text x="100" y="130">1.16</text>
    <text x="127" y="130">…</text>
    <text x="160" y="130">Latest</text>
  </g>
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" style="fill:var(--feat-muted)">1.1 — Latest, one server</text>
  <circle r="2.5" fill="#43e97b">
    <animate attributeName="cx" values="40;160;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="108;108;108" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>

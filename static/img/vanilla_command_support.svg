    <line x1="0" y1="60" x2="200" y2="60"/>
    <line x1="0" y1="140" x2="200" y2="140"/>
  </g>
  <text x="100" y="38" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" style="fill:var(--feat-title)">Vanilla Command Support</text>
  <rect x="30" y="62" width="140" height="86" rx="6" ry="6" style="fill:var(--feat-surface);stroke:var(--feat-line)" stroke-width="1"/>
